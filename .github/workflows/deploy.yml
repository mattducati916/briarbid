name: Build and Deploy to GoDaddy

on:
  push:
      branches: [ main ]
        workflow_dispatch:

        jobs:
          build-and-deploy:
              runs-on: ubuntu-latest
                  steps:
                        - name: Checkout code
                                uses: actions/checkout@v4

                                      - name: Setup Node.js
                                              uses: actions/setup-node@v4
                                                      with:
                                                                node-version: '20'
                                                                          cache: 'npm'

                                                                                - name: Install dependencies
                                                                                        run: npm ci

                                                                                              - name: Replace api.js with PHP version
                                                                                                      run: |
                                                                                                                cat > src/lib/api.js << 'APIEOF'
                                                                                                                          const BASE = '/api';
                                                                                                                                    function getToken() { return localStorage.getItem('bb_token'); }
                                                                                                                                              function authHeaders() { const t=getToken(); return t?{Authorization:`Bearer ${t}`}:{}; }
                                                                                                                                                        async function request(path, options={}) {
                                                                                                                                                                    const phpPath=path.replace(/^(\/[^?]*)(\?.*)?$/,(_,p,qs)=>`${p}.php${qs||''}`);
                                                                                                                                                                                const res=await fetch(`${BASE}${phpPath}`,{...options,headers:{'Content-Type':'application/json',...authHeaders(),...(options.headers||{})}});
                                                                                                                                                                                            const data=await res.json();
                                                                                                                                                                                                        if(!res.ok) throw new Error(data.error||'Request failed');
                                                                                                                                                                                                                    return data;
                                                                                                                                                                                                                              }
                                                                                                                                                                                                                                        export const login=(e,p)=>request('/auth-login',{method:'POST',body:JSON.stringify({email:e,password:p})});
                                                                                                                                                                                                                                                  export const register=(payload)=>request('/auth-register',{method:'POST',body:JSON.stringify(payload)});
                                                                                                                                                                                                                                                            export const getHome=()=>request('/home');
                                                                                                                                                                                                                                                                      export const getAuctions=(params={})=>{const qs=new URLSearchParams(Object.fromEntries(Object.entries(params).filter(([,v])=>v!==''&&v!=null))).toString();return request(`/auctions${qs?'?'+qs:''}`);};
                                                                                                                                                                                                                                                                                export const getAuction=(id)=>request(`/auction?id=${id}`);
                                                                                                                                                                                                                                                                                          export const placeBid=(auction_id,amount)=>request('/bid',{method:'POST',body:JSON.stringify({auction_id,amount})});
                                                                                                                                                                                                                                                                                                    export const createAuction=(payload)=>request('/sell',{method:'POST',body:JSON.stringify(payload)});
                                                                                                                                                                                                                                                                                                              export const getWatchlist=()=>request('/watchlist');
                                                                                                                                                                                                                                                                                                                        export const toggleWatch=(auction_id)=>request('/watchlist',{method:'POST',body:JSON.stringify({auction_id})});
                                                                                                                                                                                                                                                                                                                                  export const getDashboard=()=>request('/dashboard');
                                                                                                                                                                                                                                                                                                                                            export const getNotifications=()=>request('/notifications');
                                                                                                                                                                                                                                                                                                                                                      export const getProfile=(username)=>request(`/profile?username=${username}`);
                                                                                                                                                                                                                                                                                                                                                                APIEOF
                                                                                                                                                                                                                                                                                                                                                                
                                                                                                                                                                                                                                                                                                                                                                      - name: Build with Vite
                                                                                                                                                                                                                                                                                                                                                                              run: npm run build
                                                                                                                                                                                                                                                                                                                                                                              
                                                                                                                                                                                                                                                                                                                                                                                    - name: Deploy dist to GoDaddy via FTP
                                                                                                                                                                                                                                                                                                                                                                                            uses: SamKirkland/FTP-Deploy-Action@v4.3.5
                                                                                                                                                                                                                                                                                                                                                                                                    with:
                                                                                                                                                                                                                                                                                                                                                                                                              server: p3plzcpnl506679.prod.phx3.secureserver.net
                                                                                                                                                                                                                                                                                                                                                                                                                        username: ew5m20poz4n7
                                                                                                                                                                                                                                                                                                                                                                                                                                  password: ${{ secrets.FTP_PASSWORD }}
                                                                                                                                                                                                                                                                                                                                                                                                                                            local-dir: ./dist/
                                                                                                                                                                                                                                                                                                                                                                                                                                                      server-dir: /public_html/
                                                                                                                                                                                                                                                                                                                                                                                                                                                                exclude: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                            **/.git*
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        **/.git*/**
